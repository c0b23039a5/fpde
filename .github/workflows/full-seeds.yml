  aggregate:
    name: Aggregate completed seeds
    runs-on: ubuntu-latest
    needs:
      - task-seed-0
      - task-seed-1
      - task-seed-2
      - task-seed-3
    if: always()

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
