          python-version: "3.14"
          cache: "pip"

      - name: Install aggregation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy scipy tabulate jinja2

      - name: Download task seed artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: fpde-openml-task-*-seed-*
          path: results_recomputed
          merge-multiple: true

      - name: Aggregate completed seeds
